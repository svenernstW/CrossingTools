name: R-CMD-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13, ubuntu-latest, windows-latest]
        r: [release]
    runs-on: ${{ matrix.os }}
    env:
      # Keep sources in the installed package (handy for debugging backtraces)
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true   # faster binary installs on macOS/Linux

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
          use-public-rspm: true

      - name: R CMD check (no manual)
        run: |
          Rscript -e 'rcmdcheck::rcmdcheck(args=c("--as-cran","--no-manual"), error_on="warning")'
